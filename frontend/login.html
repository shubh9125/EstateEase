<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EstateEase</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="brand">
            <div class="brand-mark">EE</div>
            <div class="brand-text">
                <b>EstateEase</b>
                <span class="small">Login to your account</span>
            </div>
        </div>
        <nav id="mainNav"></nav>
        <script src="js/header.js"></script>
    </header>

    <div class="lcontainer">
        <div class="card">
            <h2><center>Login</center></h2>
            <input type="text" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            
            <button onclick="login()">Login</button>
            <p class ="small" id = "msg">Don't have an account? <a href="register.html"><u>Register here</u></a>.</p>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            try{
                const data = await api("/auth/login", "POST", {email, password});
                saveSession(data.token, data.user);
                if(data.user.role==="buyer")window.location.href = "buyer.html";
                else if(data.user.role==="seller")window.location.href = "seller.html";
                else if(data.user.role==="renter")window.location.href = "renter.html";
                else window.location.href = "admin.html";
            }catch(e){
                document.getElementById("msg").textContent = e.message;
            }
        }
    </script>
</body>
</html>
