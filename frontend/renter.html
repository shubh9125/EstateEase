<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renter Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="brand">
            <div class="brand-mark">EE</div>
            <div class="brand-text">
                <b>EstateEase</b>
                <span class="small">Renter Dashboard</span>
            </div>
        </div>
        <nav id="mainNav"></nav>
        <script src="js/header.js"></script>
    </header>   
    <div class="container">
        <div class="card" id="info"></div>
        <div class="card">
            <h3>Browse Properties</h3>
            <button onclick="goRent()">Browse Listings</button>
            <p class="small">By opening the properties you can send the "Contact/Booking" request.</p>
        </div>

        <div class="card">
            <h3>Your Sent Requests</h3>
            <button class="secondary" onclick="loadMyInbox()">Refresh Inbox</button>
            <div id="inbox"></div>
        </div>
    </div> 
    <script src="js/api.js"></script>   
    <script src="js/auth.js"></script>  
    <script src="js/renter.js"></script>
    </body>
</html>
